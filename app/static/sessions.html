<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FH6 Telemetry — Sessions</title>
  <meta name="theme-color" content="#0d1117" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/static/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <nav class="nav">
    <span class="brand"><span class="fh">FH6</span> Telemetry</span>
    <a class="navlink" href="/">Live</a>
    <a class="navlink" href="/sessions">Sessions</a>
    <a class="navlink" href="/analysis">Analysis</a>
    <a class="navlink" href="/compare">Compare</a>
    <a class="navlink" href="/debug">Debug</a>
  </nav>

  <main class="page">
    <div class="spread" style="margin-bottom:12px;">
      <h1>Sessions</h1>
      <button id="btnRefresh" class="btn small">Refresh</button>
    </div>

    <div id="empty" class="notice hidden">No recorded sessions yet. Start a recording from the Live dashboard.</div>

    <div class="tablewrap card tight">
      <table class="data">
        <thead>
          <tr>
            <th>Name</th><th>Date</th><th class="right">Ordinal</th><th>Class</th>
            <th class="right">PI</th><th>Drive</th><th class="right">Cyl</th>
            <th class="right">Best Lap</th><th class="right">Frames</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="rows"><tr><td colspan="10" class="muted">Loading…</td></tr></tbody>
      </table>
    </div>

    <p class="muted" style="font-size:12px;margin-top:14px;">
      Tip: use the checkboxes to pick two sessions, then click <b>Compare selected</b>.
    </p>
    <div class="btnrow"><button id="btnCompare" class="btn" disabled>Compare selected</button></div>
  </main>

  <script src="/static/app.js"></script>
  <script>
  (function () {
    "use strict";
    const { api, esc, fmt, fmtLapTime, fmtDate } = window.FH;
    window.FH.registerSW();

    const rowsEl = document.getElementById("rows");
    const compareSel = new Set();

    function actions(s) {
      return [
        '<div class="btnrow">',
        '<a class="btn small primary" href="/analysis?session=' + s.id + '">Analysis</a>',
        '<a class="btn small" href="/api/sessions/' + s.id + '/download.csv">CSV</a>',
        '<button class="btn small" data-act="rename" data-id="' + s.id + '">Rename</button>',
        '<button class="btn small" data-act="notes" data-id="' + s.id + '">Notes</button>',
        '<button class="btn small danger" data-act="delete" data-id="' + s.id + '">Delete</button>',
        '</div>'
      ].join("");
    }

    function rowHTML(s) {
      const checked = compareSel.has(s.id) ? " checked" : "";
      return "<tr data-row='" + s.id + "'>" +
        "<td><label class='nowrap'><input type='checkbox' data-cmp='" + s.id + "'" + checked + "> " +
          esc(s.name || ("Session " + s.id)) + "</label></td>" +
        "<td class='nowrap'>" + esc(fmtDate(s.created_at)) + "</td>" +
        "<td class='right'>" + esc(s.car_ordinal != null ? s.car_ordinal : "–") + "</td>" +
        "<td>" + esc(s.car_class || "–") + "</td>" +
        "<td class='right'>" + esc(s.car_pi != null ? s.car_pi : "–") + "</td>" +
        "<td>" + esc(s.drivetrain || "–") + "</td>" +
        "<td class='right'>" + esc(s.cylinders != null ? s.cylinders : "–") + "</td>" +
        "<td class='right accent'>" + esc(fmtLapTime(s.best_lap)) + "</td>" +
        "<td class='right'>" + esc(fmt(s.frame_count, 0)) + "</td>" +
        "<td>" + actions(s) + "</td>" +
        "</tr>";
    }

    async function load() {
      rowsEl.innerHTML = '<tr><td colspan="10" class="muted">Loading…</td></tr>';
      try {
        const data = await api("/api/sessions");
        const list = data.sessions || [];
        document.getElementById("empty").classList.toggle("hidden", list.length > 0);
        if (!list.length) { rowsEl.innerHTML = ""; return; }
        rowsEl.innerHTML = list.map(rowHTML).join("");
      } catch (e) {
        rowsEl.innerHTML = '<tr><td colspan="10" class="muted">Error: ' + esc(e.message) + '</td></tr>';
      }
      updateCompareBtn();
    }

    function updateCompareBtn() {
      const btn = document.getElementById("btnCompare");
      btn.disabled = compareSel.size !== 2;
      btn.textContent = "Compare selected (" + compareSel.size + "/2)";
    }

    rowsEl.addEventListener("change", function (e) {
      const cb = e.target.closest("input[data-cmp]");
      if (!cb) return;
      const id = Number(cb.getAttribute("data-cmp"));
      if (cb.checked) {
        if (compareSel.size >= 2) { cb.checked = false; alert("Pick at most two sessions."); return; }
        compareSel.add(id);
      } else compareSel.delete(id);
      updateCompareBtn();
    });

    rowsEl.addEventListener("click", async function (e) {
      const btn = e.target.closest("button[data-act]");
      if (!btn) return;
      const id = Number(btn.getAttribute("data-id"));
      const act = btn.getAttribute("data-act");
      try {
        if (act === "rename") {
          const name = prompt("New session name:");
          if (name === null) return;
          await api("/api/sessions/" + id, { method: "PATCH", json: { name: name } });
          load();
        } else if (act === "notes") {
          const cur = await api("/api/sessions/" + id);
          const notes = prompt("Notes:", cur.notes || "");
          if (notes === null) return;
          await api("/api/sessions/" + id, { method: "PATCH", json: { notes: notes } });
          alert("Notes saved.");
        } else if (act === "delete") {
          if (!confirm("Delete this session permanently? This cannot be undone.")) return;
          await api("/api/sessions/" + id, { method: "DELETE" });
          compareSel.delete(id);
          load();
        }
      } catch (err) { alert("Action failed: " + err.message); }
    });

    document.getElementById("btnCompare").addEventListener("click", function () {
      if (compareSel.size !== 2) return;
      const ids = Array.from(compareSel);
      location.href = "/compare?a=" + ids[0] + "&b=" + ids[1];
    });
    document.getElementById("btnRefresh").addEventListener("click", load);

    load();
  })();
  </script>
</body>
</html>

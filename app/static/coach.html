<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FH6 Telemetry — Coach</title>
  <meta name="theme-color" content="#16130F" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/static/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="page">
    <div class="spread" style="margin-bottom:4px;">
      <h1 style="margin:0;">Coach</h1>
      <select id="coachSel" class="btn small ghost" aria-label="Session"></select>
    </div>
    <p class="loadnote" style="margin:0 0 12px;">Your last race, read back to
      you — what to fix, and whether it's you or the car. Nothing leaves this
      machine.</p>

    <div id="empty" class="notice hidden">
      No sessions yet. Drive a car with recording on, then come back.
    </div>

    <div id="coachMount" aria-live="polite"></div>

    <footer class="foot">Computed on your device from this session's
      telemetry · no cloud, no AI.</footer>
  </main>

  <script src="/static/app.js"></script>
  <script>
  (function () {
    const { api, esc, coachCard, toast } = FH;
    FH.shell("coach");
    FH.registerSW();

    const sel = document.getElementById("coachSel");
    const empty = document.getElementById("empty");
    const mount = document.getElementById("coachMount");

    async function show(id) {
      try {
        coachCard(mount, await api("/api/sessions/" + id + "/coach"));
      } catch (e) { toast("Coach failed: " + e.message); }
    }

    (async function init() {
      let list = [];
      try { list = (await api("/api/sessions")).sessions || []; }
      catch (e) { toast("Failed to load sessions: " + e.message); return; }
      const drivable = list.filter((s) => s.car_ordinal);
      if (!drivable.length) { empty.classList.remove("hidden"); return; }
      sel.innerHTML = drivable.map((s) =>
        '<option value="' + s.id + '">' +
        esc(s.car_name || ("Session " + s.id)) + " · " +
        esc((s.created_at || "").slice(0, 10)) + "</option>").join("");
      sel.addEventListener("change", () => show(sel.value));
      show(drivable[0].id);
    })();
  })();
  </script>
</body>
</html>

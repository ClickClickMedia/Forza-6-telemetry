name: "💡 Feature request"
description: Suggest a new metric, chart, or capability.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: What would you like to see?
      description: Describe the feature and the problem it solves.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Mockups, similar tools, or which page it belongs on (live / analysis / compare).
    validations:
      required: false

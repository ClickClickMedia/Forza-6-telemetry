name: Build Windows executable

# Produces a standalone fh6-telemetry.exe with PyInstaller on a Windows runner.
#
# Triggers:
#   * Manually (Actions tab -> "Run workflow").
#   * On pushing a tag like "v1.0.0" -> also publishes a GitHub Release with
#     the exe attached, so you can just download and double-click.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create a Release on tag builds

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-exe.txt

      - name: Build executable
        run: pyinstaller --clean --noconfirm fh6-telemetry.spec

      - name: Smoke-test the executable
        shell: pwsh
        run: |
          # Launch with the synthetic generator and confirm /health responds.
          $env:FH6_SYNTHETIC = "1"
          $env:FH6_HTTP_PORT = "8080"
          $proc = Start-Process -FilePath ".\dist\fh6-telemetry.exe" -PassThru
          try {
            $ok = $false
            for ($i = 0; $i -lt 20; $i++) {
              Start-Sleep -Seconds 1
              try {
                $r = Invoke-RestMethod "http://127.0.0.1:8080/health" -TimeoutSec 2
                if ($r.status -eq "ok" -and $r.packet_size -eq 324) { $ok = $true; break }
              } catch { }
            }
            if (-not $ok) { throw "executable did not serve /health with packet_size 324" }
            Write-Host "Smoke test passed: /health ok, packet_size 324"
          } finally {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: fh6-telemetry-windows
          path: dist/fh6-telemetry.exe
          if-no-files-found: error

      - name: Publish release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/fh6-telemetry.exe
          generate_release_notes: true
